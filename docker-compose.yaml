services:
  mysql:
    image: mysql:8
    container_name: iron-dome-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iron_dome
    volumes:
      - ./repository/database.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
volumes:
  mysql-data: